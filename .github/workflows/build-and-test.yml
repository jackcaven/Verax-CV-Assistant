name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Test on Linux
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.11', '3.12']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src tests

      - name: Type check with mypy
        run: |
          mypy src --ignore-missing-imports || echo "MyPy checks completed (some warnings from untyped libraries)"
        continue-on-error: true

      - name: Run tests with pytest
        run: pytest tests/ -v --cov=src/verax --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # Build on multiple platforms
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.runs-on }}
    needs: test
    strategy:
      matrix:
        include:
          - os: Windows
            runs-on: windows-latest
            script: bash packaging/build_windows.sh
            artifact-dir: dist/windows
            artifact-name: Verax-Windows
            asset-pattern: 'Verax.exe'

          - os: macOS
            runs-on: macos-latest
            script: bash packaging/build_macos.sh
            artifact-dir: dist/macos
            artifact-name: Verax-macOS
            asset-pattern: 'Verax.app'

          - os: Linux
            runs-on: ubuntu-latest
            script: bash packaging/build_linux.sh
            artifact-dir: dist/linux
            artifact-name: Verax-Linux
            asset-pattern: 'Verax'
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libreoffice

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice xvfb

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build application
        run: ${{ matrix.script }}

      - name: Check build artifacts
        run: |
          echo "Build artifacts:"
          find ${{ matrix.artifact-dir }} -type f -name "${{ matrix.asset-pattern }}" 2>/dev/null || echo "Pattern not found, listing directory:"
          ls -lah ${{ matrix.artifact-dir }}/ 2>/dev/null || echo "Directory not found"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-dir }}/
          retention-days: 30

      - name: Generate build report
        if: always()
        run: |
          echo "## Build Report: ${{ matrix.os }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ${{ runner.os }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Directory:** ${{ matrix.artifact-dir }}" >> $GITHUB_STEP_SUMMARY
          if [ -d "${{ matrix.artifact-dir }}" ]; then
            echo "- **Status:** ✅ Build directory exists" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Artifacts:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            ls -lh ${{ matrix.artifact-dir }}/ >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Status:** ❌ Build directory not found" >> $GITHUB_STEP_SUMMARY
          fi

  # Create summary report
  summary:
    name: Test & Build Summary
    runs-on: ubuntu-latest
    needs: [test, build]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "# Verax CI/CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Status" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Job:** ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Job:** ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Platforms" >> $GITHUB_STEP_SUMMARY
          echo "- Windows: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- macOS: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Linux: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "Download build artifacts from the Actions tab." >> $GITHUB_STEP_SUMMARY
