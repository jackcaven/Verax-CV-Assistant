name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

  build:
    name: Build Release (${{ matrix.os }})
    runs-on: ${{ matrix.runs-on }}
    needs: test
    strategy:
      matrix:
        include:
          - os: Windows
            runs-on: windows-latest
            script: bash packaging/build_windows.sh
            artifact-dir: dist/windows
            artifact-name: Verax-Windows-${{ github.ref_name }}.zip

          - os: macOS
            runs-on: macos-latest
            script: bash packaging/build_macos.sh
            artifact-dir: dist/macos
            artifact-name: Verax-macOS-${{ github.ref_name }}.dmg

          - os: Linux
            runs-on: ubuntu-latest
            script: bash packaging/build_linux.sh
            artifact-dir: dist/linux
            artifact-name: Verax-Linux-${{ github.ref_name }}.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libreoffice

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice xvfb

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build application
        run: ${{ matrix.script }}

      - name: Create release asset (Windows)
        if: runner.os == 'Windows'
        run: |
          cd dist/windows
          powershell Compress-Archive -Path * -DestinationPath "../Verax-Windows-${{ github.ref_name }}.zip"

      - name: Create release asset (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist/macos
          hdiutil create -volname "Verax" -srcfolder . -ov -format UDZO "../Verax-macOS-${{ github.ref_name }}.dmg"

      - name: Create release asset (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist/linux
          tar -czf "../Verax-Linux-${{ github.ref_name }}.tar.gz" .

      - name: Upload release asset
        uses: actions/upload-artifact@v3
        with:
          name: release-${{ matrix.os }}
          path: dist/*.{zip,dmg,gz}
          retention-days: 90

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v3

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-Windows/**
            release-macOS/**
            release-Linux/**
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
